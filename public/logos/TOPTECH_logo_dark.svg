<svg width="200mm" height="200mm" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="accentGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF88"/>
      <stop offset="100%" stop-color="#00CC88"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="400" cy="400" r="380" fill="url(#bgGradDark)" filter="url(#softShadow)"/>
  <circle cx="400" cy="400" r="380" fill="none" stroke="url(#accentGradDark)" stroke-width="6" opacity="0.6"/>

  <!-- Signal / connectivity mark -->
  <g transform="translate(400,300)">
    <circle cx="0" cy="60" r="22" fill="url(#accentGradDark)"/>
    <path d="M -70 30 A 99 99 0 0 1 70 30" fill="none" stroke="url(#accentGradDark)" stroke-width="18" stroke-linecap="round"/>
    <path d="M -130 -20 A 184 184 0 0 1 130 -20" fill="none" stroke="url(#accentGradDark)" stroke-width="18" stroke-linecap="round" opacity="0.75"/>
    <path d="M -190 -70 A 269 269 0 0 1 190 -70" fill="none" stroke="url(#accentGradDark)" stroke-width="18" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <text x="400" y="560" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="92" letter-spacing="4" fill="#FFFFFF">TOP<tspan fill="#00FF88">TECH</tspan></text>

  <!-- Tagline -->
  <text x="400" y="605" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="26" letter-spacing="6" fill="#88CC88">INTERNET SERVICE PROVIDER</text>

  <!-- Bottom accent line -->
  <rect x="290" y="630" width="220" height="4" rx="2" fill="url(#accentGradDark)"/>
</svg>